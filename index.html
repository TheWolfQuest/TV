<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<link rel="manifest" href="manifest.webmanifest">
<style>
:root{--navy:#172554;--blue:#2563eb;--pale:#eff6ff;--ink:#172033;--muted:#667085;--line:#dbe3ef;--good:#15803d;--bad:#b91c1c;--card:#fff}
*{box-sizing:border-box} body{margin:0;background:#f5f7fb;color:var(--ink);font:16px system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
header{position:sticky;top:0;z-index:5;background:linear-gradient(135deg,var(--navy),#1d4ed8);color:white;padding:calc(16px + env(safe-area-inset-top)) 16px 16px;box-shadow:0 2px 12px #0002}
header h1{margin:0;font-size:1.35rem} header p{margin:4px 0 0;opacity:.85;font-size:.9rem}
main{max-width:1000px;margin:auto;padding:14px 14px 90px}
.toolbar{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:12px} input,select,textarea,button{font:inherit}
input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px;background:white;color:var(--ink)}
.filters{display:grid;grid-template-columns:1fr 1fr;gap:8px} .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
.stat{background:white;border:1px solid var(--line);border-radius:14px;padding:10px;text-align:center} .stat b{display:block;font-size:1.25rem}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0} button{border:0;border-radius:12px;padding:10px 13px;background:var(--blue);color:white;font-weight:650;cursor:pointer} button.secondary{background:white;color:var(--navy);border:1px solid var(--line)} button.danger{background:#fff1f2;color:var(--bad);border:1px solid #fecdd3}
.list{display:grid;gap:10px} .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px;box-shadow:0 2px 8px #1725540b}
.cardtop{display:flex;justify-content:space-between;gap:10px;align-items:flex-start} .title{font-size:1.05rem;font-weight:750} .network{color:var(--muted);font-size:.9rem;margin-top:3px}
.badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px} .badge{font-size:.78rem;padding:4px 8px;border-radius:999px;background:var(--pale);color:var(--navy)} .badge.good{background:#ecfdf3;color:var(--good)} .badge.bad{background:#fff1f2;color:var(--bad)}
.cardbuttons{display:flex;gap:7px;margin-top:10px} .cardbuttons button{padding:7px 10px;font-size:.85rem}
.empty{text-align:center;padding:40px;color:var(--muted)}
dialog{border:0;border-radius:18px;padding:0;max-width:560px;width:calc(100% - 24px);box-shadow:0 24px 70px #0005} dialog::backdrop{background:#0f172a99} .modal{padding:18px} .modal h2{margin-top:0} .formgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px} .full{grid-column:1/-1} label{font-size:.82rem;color:var(--muted)}
footer{position:fixed;bottom:0;left:0;right:0;background:#ffffffee;backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:9px 14px calc(9px + env(safe-area-inset-bottom));display:flex;justify-content:center}
@media(min-width:720px){.toolbar{grid-template-columns:2fr 1fr 1fr} .filters{display:contents} .list{grid-template-columns:1fr 1fr}}
</style></head><body>
<header><h1>🎬 Keith's Watch List</h1><p>Your spreadsheet, made easier to search and update.</p></header>
<main>
<div class="toolbar"><input id="search" placeholder="Search shows or networks…"><div class="filters"><select id="network"><option value="">All networks</option></select><select id="status"><option value="">All statuses</option><option>Watch</option><option>Watching</option><option>Watched</option><option>Very Good</option><option>Okay</option><option>No Good</option></select></div></div>
<div class="stats"><div class="stat"><b id="total">0</b><span>Shows</span></div><div class="stat"><b id="now">0</b><span>Available now</span></div><div class="stat"><b id="upcoming">0</b><span>Upcoming</span></div></div>
<div class="actions"><button onclick="openEditor()">＋ Add show</button><button class="secondary" onclick="exportData()">Export backup</button><button class="secondary" onclick="document.getElementById('importFile').click()">Import backup</button><input id="importFile" type="file" accept="application/json" hidden></div>
<div id="list" class="list"></div>
</main><footer><button onclick="openEditor()">＋ Add a Show</button></footer>
<dialog id="editor"><form method="dialog" class="modal" id="editForm"><h2 id="editHeading">Add show</h2><input type="hidden" id="editId"><div class="formgrid">
<div class="full"><label>Show name</label><input id="editTitle" required></div><div><label>Network</label><input id="editNetwork"></div><div><label>Date or availability</label><input id="editWhen" placeholder="NOW, Pay, or date"></div>
<div><label>Status</label><select id="editStatus"><option>Watch</option><option>Watching</option><option>Watched</option><option>Very Good</option><option>Okay</option><option>No Good</option></select></div><div><label>Rating</label><select id="editRating"><option value="">No rating</option><option>★</option><option>★★</option><option>★★★</option><option>★★★★</option><option>★★★★★</option></select></div>
<div class="full"><label>Notes</label><textarea id="editNotes" rows="3"></textarea></div></div><div class="actions"><button value="default" onclick="saveEdit(event)">Save</button><button class="secondary" value="cancel">Cancel</button><button type="button" id="deleteBtn" class="danger" onclick="deleteCurrent()">Delete</button></div></form></dialog>

let shows=JSON.parse(localStorage.getItem('keith-watch-list')||'null')||seed;
const $=id=>document.getElementById(id); const save=()=>localStorage.setItem('keith-watch-list',JSON.stringify(shows));
function classifyWhen(v){v=(v||'').trim(); if(v.toUpperCase()==='NOW')return 'Available now'; if(/^\d{4}-\d{2}-\d{2}$/.test(v))return 'Upcoming'; return 'Unknown'}
function setupNetworks(){let current=$('network').value; let n=[...new Set(shows.map(x=>x.network).filter(Boolean))].sort(); $('network').innerHTML='<option value="">All networks</option>'+n.map(x=>`<option>${esc(x)}</option>`).join(''); $('network').value=current}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function render(){setupNetworks(); let q=$('search').value.toLowerCase(), net=$('network').value, st=$('status').value;
 let view=shows.filter(x=>(!q||(x.title+' '+x.network+' '+x.notes).toLowerCase().includes(q))&&(!net||x.network===net)&&(!st||x.status===st)).sort((a,b)=>a.title.localeCompare(b.title));
 $('total').textContent=shows.length; $('now').textContent=shows.filter(x=>classifyWhen(x.when)==='Available now').length; $('upcoming').textContent=shows.filter(x=>classifyWhen(x.when)==='Upcoming').length;
 $('list').innerHTML=view.length?view.map(card).join(''):'<div class="empty">No matching shows.</div>';}
function card(x){let cls=x.status==='Very Good'?'good':x.status==='No Good'?'bad':''; return `<article class="card"><div class="cardtop"><div><div class="title">${esc(x.title)}</div><div class="network">${esc(x.network||'Network not entered')}</div></div><span class="badge ${cls}">${esc(x.status)}</span></div><div class="badges">${x.when?`<span class="badge">${esc(x.when)}</span>`:''}${x.cost==='Extra cost'?'<span class="badge bad">Extra cost</span>':''}${x.rating?`<span class="badge">${x.rating}</span>`:''}</div>${x.notes?`<div class="network" style="margin-top:9px">${esc(x.notes)}</div>`:''}<div class="cardbuttons"><button onclick="quickStatus('${x.id}','Watching')">Watching</button><button class="secondary" onclick="quickStatus('${x.id}','Watched')">Watched</button><button class="secondary" onclick="openEditor('${x.id}')">Edit</button></div></article>`}
function quickStatus(id,status){let x=shows.find(x=>x.id===id); if(x){x.status=status;save();render()}}
function openEditor(id=''){let x=shows.find(x=>x.id===id); $('editHeading').textContent=x?'Edit show':'Add show'; $('editId').value=x?.id||''; $('editTitle').value=x?.title||''; $('editNetwork').value=x?.network||''; $('editWhen').value=x?.when||''; $('editStatus').value=x?.status||'Watch'; $('editRating').value=x?.rating||''; $('editNotes').value=x?.notes||''; $('deleteBtn').style.display=x?'inline-block':'none'; $('editor').showModal()}
function saveEdit(e){e.preventDefault(); let id=$('editId').value; let obj={id:id||'user-'+Date.now(),title:$('editTitle').value.trim(),network:$('editNetwork').value.trim(),when:$('editWhen').value.trim(),status:$('editStatus').value,rating:$('editRating').value,notes:$('editNotes').value.trim()}; if(!obj.title)return; let i=shows.findIndex(x=>x.id===id); if(i>=0)shows[i]={...shows[i],...obj}; else shows.push(obj); save(); $('editor').close(); render()}
function deleteCurrent(){let id=$('editId').value;if(id&&confirm('Delete this show?')){shows=shows.filter(x=>x.id!==id);save();$('editor').close();render()}}
function exportData(){let b=new Blob([JSON.stringify(shows,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='keith-watch-list-backup.json';a.click();URL.revokeObjectURL(a.href)}
$('importFile').addEventListener('change',e=>{let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{let d=JSON.parse(r.result);if(Array.isArray(d)){shows=d;save();render();alert('Backup imported.')}}catch{alert('That file could not be imported.')}};r.readAsText(f)});
